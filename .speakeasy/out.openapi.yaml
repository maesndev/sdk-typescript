openapi: 3.0.0
paths:
  /accounting/accounts/{accountId}:
    get:
      operationId: getAccount
      parameters:
        - name: accountId
          required: true
          in: path
          schema:
            type: string
        - name: environmentName
          required: false
          in: query
          description: Environment name (required for multi-environment systems such as Business Central)
          schema:
            type: string
        - name: companyId
          required: false
          in: query
          description: ID of the company (required for multi-company target systems)
          schema:
            type: string
        - name: rawData
          required: false
          in: query
          description: When true, returns the unprocessed response from the upstream target system
          schema:
            type: boolean
      responses:
        "200":
          description: Account record matching the provided ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponseDto'
                  - properties:
                      data:
                        $ref: '#/components/schemas/AccountResponseDto'
      tags:
        - accounting
      x-speakeasy-retries:
        strategy: backoff
        backoff:
          initialInterval: 500
          maxInterval: 60000
          maxElapsedTime: 3600000
          exponent: 1.5
        statusCodes:
          - 5XX
        retryConnectionErrors: true
  /accounting/accounts:
    get:
      operationId: getAccounts
      parameters:
        - name: page
          required: false
          in: query
          schema:
            type: number
        - name: limit
          required: false
          in: query
          schema:
            enum:
              - 5
              - 10
              - 20
              - 50
              - 100
            type: integer
        - name: lastModifiedAt
          required: false
          in: query
          description: ISO 8601 timestamp; only records modified after this date are returned
          schema:
            type: string
        - name: environmentName
          required: false
          in: query
          description: Environment name (required for multi-environment systems such as Business Central)
          schema:
            type: string
        - name: companyId
          required: false
          in: query
          description: ID of the company (required for multi-company target systems)
          schema:
            type: string
        - name: rawData
          required: false
          in: query
          description: When true, returns the unprocessed response from the upstream target system
          schema:
            type: boolean
        - name: debitCreditIndicator
          required: false
          in: query
          description: Filter accounts by debit/credit indicator
          schema:
            enum:
              - DEBIT
              - CREDIT
            type: string
        - name: fiscalYear
          required: false
          in: query
          description: Fiscal year to scope the account balances (e.g. 2024)
          schema:
            type: number
        - name: types
          required: false
          in: query
          description: Comma-separated list of account types to filter by
          schema:
            type: string
        - name: fiscalYearStartDate
          required: false
          in: query
          description: ISO 8601 start date of the fiscal year used for balance calculation
          schema:
            type: string
        - name: classFilter
          required: false
          in: query
          description: Filter accounts by account class (e.g. asset, liability, equity)
          schema:
            type: string
        - name: isActive
          required: false
          in: query
          description: When true, returns only active accounts; when false, returns only inactive accounts
          schema:
            type: boolean
      responses:
        "200":
          description: List of accounts for the authenticated end user's connected target system
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponseDto'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AccountResponseDto'
      tags:
        - accounting
      x-speakeasy-retries:
        strategy: backoff
        backoff:
          initialInterval: 500
          maxInterval: 60000
          maxElapsedTime: 3600000
          exponent: 1.5
        statusCodes:
          - 5XX
        retryConnectionErrors: true
    post:
      operationId: createAccount
      parameters:
        - name: environmentName
          required: false
          in: query
          description: Environment name (required for multi-environment systems such as Business Central)
          schema:
            type: string
        - name: companyId
          required: false
          in: query
          description: ID of the company (required for multi-company target systems)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequestDto'
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponseDto'
                  - properties:
                      data:
                        $ref: '#/components/schemas/AccountResponseDto'
      tags:
        - accounting
