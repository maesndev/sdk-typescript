overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Auth Global Security Overlay
  version: 0.0.1
actions:
  # Rename X-API-KEY and X-ACCOUNT-KEY to apiKey/accountKey in the SDK
  - target: $["paths"][*][*]["parameters"][?(@["name"] == "X-API-KEY")]
    update:
      x-speakeasy-name-override: apiKey
  - target: $["paths"][*][*]["parameters"][?(@["name"] == "X-ACCOUNT-KEY")]
    update:
      x-speakeasy-name-override: accountKey
  # Promote X-API-KEY and X-ACCOUNT-KEY to SDK constructor globals so they
  # are set once on the Maesn instance and auto-injected into every request.
  - target: $
    update:
      x-speakeasy-globals:
        parameters:
          - name: X-API-KEY
            in: header
            schema:
              type: string
            x-speakeasy-name-override: apiKey
          - name: X-ACCOUNT-KEY
            in: header
            schema:
              type: string
            x-speakeasy-name-override: accountKey
